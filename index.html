<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Toddler Timer</title>
  <meta name="description" content="A big, friendly visual countdown timer for little kids." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#FF8A4C" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Toddler Timer" />

  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app">
    <h1 class="app__title">Toddler <span>Timer</span></h1>

    <!-- The big draining bar -->
    <div class="stage">
      <div class="rectangle horizontal" id="rectangle">
        <div class="fill" id="fill"></div>
      </div>

      <!-- Celebration text (sits over the stage, shown only when done) -->
      <div class="done" id="done" hidden aria-live="polite">
        <div class="done__text">All done!</div>
      </div>
    </div>

    <!-- Time: editor (setup) OR big readout (running/paused/done),
         with the show/hide-numbers toggle right beside it. -->
    <div class="time">
      <div class="editor" id="editor">
        <label class="editor__group">
          <span class="editor__label">Minutes</span>
          <input class="editor__input" id="minutesInput" type="number"
                 inputmode="numeric" min="0" max="99" value="5"
                 aria-label="Minutes" />
        </label>
        <span class="editor__colon" aria-hidden="true">:</span>
        <label class="editor__group">
          <span class="editor__label">Seconds</span>
          <input class="editor__input" id="secondsInput" type="number"
                 inputmode="numeric" min="0" max="59" value="00"
                 aria-label="Seconds" />
        </label>
      </div>
      <div class="readout" id="readout" role="timer" aria-live="off" hidden>05:00</div>

      <button class="eye" id="eyeToggle" type="button" aria-pressed="false"
              aria-label="Hide the numbers while the timer runs"
              title="Hide the numbers while the timer runs">
        <!-- eye open: numbers will show -->
        <svg class="eye__on" viewBox="0 0 24 24" width="28" height="28" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <!-- eye off: numbers will hide while running -->
        <svg class="eye__off" viewBox="0 0 24 24" width="28" height="28" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls">
      <button class="btn btn--start" id="startBtn" type="button">Start</button>
      <button class="btn btn--stop"  id="stopBtn"  type="button" hidden>Stop</button>
      <button class="btn btn--edit"  id="editBtn"  type="button" hidden>Edit</button>
      <button class="btn btn--reset" id="resetBtn" type="button" hidden>Reset</button>
    </div>
  </div>

  <!-- Confetti overlay (full screen, never blocks taps) -->
  <canvas class="confetti" id="confetti"></canvas>

  <!-- App logic. Plain <script> tags (not ES modules) so the app can be
       opened straight from this file with no server. Load order matters:
       app.js is last because it uses everything above it. -->
  <script src="./js/config.js"></script>
  <script src="./js/timer.js"></script>
  <script src="./js/rectangle.js"></script>
  <script src="./js/alarm.js"></script>
  <script src="./js/confetti.js"></script>
  <script src="./js/settings.js"></script>
  <script src="./js/app.js"></script>

  <!-- Register the service worker for offline use / installability when the
       app is *served* over http(s). Skipped when opened directly from a file,
       where service workers aren't allowed (and aren't needed). -->
  <script>
    if (location.protocol !== 'file:' && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
